app-id: io.github.zeclorn.DeckPlayer
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: deckplayer

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --device=all
  - --filesystem=host:ro
  - --persist=.local/share/deckplayer

cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/man
  - '*.a'
  - '*.la'

modules:
  - name: libass
    buildsystem: meson
    config-opts:
      - -Ddefault_library=shared
      - -Dtest=disabled
    sources:
      - type: git
        url: https://github.com/libass/libass.git
        tag: 0.17.4
        commit: bbb3c7f1570a4a021e52683f3fbdf74fe492ae84

  - name: python3-jinja2
    buildsystem: simple
    build-commands:
      - install -d /app/lib/python3.13/site-packages
      - cp -a src/jinja2 /app/lib/python3.13/site-packages/
    sources:
      - type: git
        url: https://github.com/pallets/jinja.git
        tag: 3.1.6

  - name: libplacebo
    buildsystem: meson
    build-options:
      env:
        PYTHONPATH: /app/lib/python3.13/site-packages
    config-opts:
      - -Ddefault_library=shared
      - -Ddemos=false
      - -Dtests=false
      - -Dvulkan=enabled
      - -Dshaderc=enabled
      - -Dopengl=disabled
      - -Dlcms=disabled
      - -Ddovi=disabled
      - -Dunwind=disabled
    sources:
      - type: git
        url: https://code.videolan.org/videolan/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4

  - name: mpv
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dlua=disabled
      - -Djavascript=disabled
      - -Dlibarchive=disabled
      - -Ddvdnav=disabled
      - -Dlibbluray=disabled
      - -Duchardet=disabled
      - -Drubberband=disabled
      - -Dlcms2=disabled
      - -Djpeg=disabled
      - -Dlibavdevice=disabled
      - -Dvulkan=enabled
      - -Dshaderc=disabled
      - -Ddrm=disabled
      - -Dgbm=disabled
      - -Dvaapi=disabled
      - -Dvaapi-drm=disabled
      - -Dvaapi-wayland=disabled
      - -Dvaapi-x11=disabled
      - -Dx11=disabled
      - -Dwayland=disabled
      - -Degl=enabled
      - -Dplain-gl=enabled
      - -Dgl=enabled
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv.git
        tag: v0.40.0
        commit: e48ac7ce08462f5e33af6ef9deeac6fa87eef01e

  - name: deckplayer
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ../..
        skip:
          - .git
          - .agents
          - .codex
          - AppDir
          - build
          - build-*
          - cmake-build-*
          - dist
          - output.txt
    post-install:
      - rm -f /app/share/applications/deckplayer.desktop
      - rm -f /app/share/icons/hicolor/scalable/apps/deckplayer.svg
      - install -Dm644 packaging/flatpak/io.github.zeclorn.DeckPlayer.desktop /app/share/applications/io.github.zeclorn.DeckPlayer.desktop
      - install -Dm644 packaging/flatpak/io.github.zeclorn.DeckPlayer.metainfo.xml /app/share/metainfo/io.github.zeclorn.DeckPlayer.metainfo.xml
      - install -Dm644 assets/icons/deckplayer.svg /app/share/icons/hicolor/scalable/apps/io.github.zeclorn.DeckPlayer.svg
      - install -Dm644 LICENSE /app/share/licenses/io.github.zeclorn.DeckPlayer/LICENSE
