name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install, configure, and build
        id: build
        run: |
          set -o pipefail
          {
            sudo apt-get update
            sudo apt-get install -y \
              cmake \
              ninja-build \
              qt6-base-dev \
              qt6-declarative-dev \
              libmpv-dev \
              libsdl2-dev \
              pkg-config
            cmake -S . -B build -G Ninja
            cmake --build build
          } 2>&1 | tee /tmp/build-output.txt
        continue-on-error: true

      - name: Post failure as PR comment
        if: steps.build.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/build-output.txt', 'utf8');
            const output = raw.slice(-4000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## CI build failure\n\`\`\`\n${output}\n\`\`\``
            });

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
