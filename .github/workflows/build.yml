name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Enable universe and install dependencies
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-declarative-dev \
            libmpv-dev \
            libsdl2-dev \
            pkg-config

      - name: Configure
        run: cmake -S . -B build -G Ninja 2>&1 | tee /tmp/cmake-output.txt

      - name: Build
        run: cmake --build build 2>&1 | tee /tmp/build-output.txt

      - name: Post failure as PR comment
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const cmake = fs.existsSync('/tmp/cmake-output.txt') ? fs.readFileSync('/tmp/cmake-output.txt', 'utf8') : '';
            const build = fs.existsSync('/tmp/build-output.txt') ? fs.readFileSync('/tmp/build-output.txt', 'utf8') : '';
            const output = (cmake + '\n' + build).slice(-4000);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## CI build failure\n\`\`\`\n${output}\n\`\`\``
            });
